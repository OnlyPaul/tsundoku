<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Tsundoku — Reader UI Kit</title>
<link rel="stylesheet" href="../../colors_and_type.css" />
<style>
  body { margin: 0; background: #E9E2D2; min-height: 100vh; display: flex; align-items: flex-start; justify-content: center; padding: 32px 16px; font-family: 'Source Serif 4', Georgia, serif; }
  .device { width: 390px; height: 780px; background: #F5EFE4; border-radius: 28px; box-shadow: 0 1px 2px rgba(0,0,0,0.1), 0 24px 60px rgba(31,27,22,0.18); overflow: hidden; position: relative; }
  @keyframes fade { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slide-up { from { transform: translateY(100%); } to { transform: translateY(0); } }
  @keyframes slide-r { from { transform: translateX(100%); } to { transform: translateX(0); } }
  @keyframes translation-in { from { opacity: 0; transform: translateY(-2px); } to { opacity: 1; transform: translateY(0); } }
  .scroll-area { width: 100%; height: 100%; overflow-y: auto; position: relative; }
  /* hide scrollbar but keep scrolling */
  .scroll-area::-webkit-scrollbar { width: 0; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script src="data.js"></script>
<script type="text/babel" src="primitives.jsx"></script>
<script type="text/babel" src="TappableToken.jsx"></script>
<script type="text/babel" src="VocabPopup.jsx"></script>
<script type="text/babel" src="SentenceTranslationPanel.jsx"></script>
<script type="text/babel" src="Library.jsx"></script>
<script type="text/babel" src="Reader.jsx"></script>
<script type="text/babel" src="SettingsSheet.jsx"></script>
<script type="text/babel">
function App() {
  const [screen, setScreen] = React.useState('library');
  const [book, setBook] = React.useState(window.SAMPLE_BOOK);
  const [settings, setSettings] = React.useState(false);
  const [prefs, setPrefs] = React.useState({ furigana: true, fontSize: 18, jpFont: 'Noto Serif JP' });
  const setPref = (k, v) => setPrefs((p) => ({ ...p, [k]: v }));

  return (
    <div className="device">
      <div className="scroll-area">
        {screen === 'library' && (
          <Library books={window.LIBRARY} continueBook={window.SAMPLE_BOOK}
            onOpen={(b) => { if (b.cover || b === window.SAMPLE_BOOK) { setBook(window.SAMPLE_BOOK); setScreen('reader'); } else { setBook({ ...b, chapter: { id: '00', title: '第一章', number: 1, total: 12 } }); setScreen('reader'); } }}/>
        )}
        {screen === 'reader' && (
          <Reader book={book} paragraphs={window.PARAGRAPHS} vocabMap={window.VOCAB} grammarMap={window.GRAMMAR}
            prefs={prefs} onBack={() => setScreen('library')} onSettings={() => setSettings(true)}/>
        )}
      </div>
      <SettingsSheet open={settings} onClose={() => setSettings(false)} prefs={prefs} setPref={setPref}/>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
