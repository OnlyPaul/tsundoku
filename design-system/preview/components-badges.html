<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Tsundoku — JLPT badges & meta</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body{margin:0;padding:22px;background:var(--paper);display:flex;flex-direction:column;gap:14px;}
  .row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
  .jlpt{font-family:var(--font-mono);font-size:10px;padding:2px 7px;border-radius:999px;border:1px solid rgba(31,27,22,0.18);background:rgba(31,27,22,0.04);color:var(--ink-soft);text-transform:uppercase;letter-spacing:0.12em;}
  .stamp{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:999px;background:#BC5A2C;color:#F5EFE4;font-family:'Noto Serif JP',serif;font-size:11px;line-height:1;}
  .h{font-family:var(--font-mono);font-size:10px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:0.12em;width:90px;}
</style>
</head>
<body>
  <div class="row"><span class="h">JLPT</span><span class="jlpt">N5</span><span class="jlpt">N4</span><span class="jlpt">N3</span><span class="jlpt">N2</span><span class="jlpt">N1</span></div>
  <div class="row"><span class="h">META</span><span class="meta">CONTINUE READING</span><span class="meta">CHAPTER 4 / 28</span></div>
  <div class="row"><span class="h">SEAL</span><span class="stamp">文</span><span class="meta">grammar marker · vermillion · 20px round</span></div>
</body>
</html>
