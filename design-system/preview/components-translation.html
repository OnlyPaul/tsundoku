<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Tsundoku — Translation panel</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body{margin:0;padding:22px;background:var(--paper);}
  .panel{background:#FBF7EE;border-left:2px solid #4A59A8;border-radius:0 4px 4px 0;padding:14px 16px;font-family:var(--font-prose);}
  .lbl{font-family:var(--font-mono);font-size:9.5px;color:rgba(115,109,102,0.85);text-transform:uppercase;letter-spacing:0.12em;display:block;margin-bottom:4px;}
  .en{font-style:italic;color:var(--ink);font-size:15px;line-height:1.4;}
  .note{margin-top:12px;border-top:1px dashed var(--rule);padding-top:10px;}
  .note .lbl{color:#BC5A2C;}
  .note p{margin:0;font-size:13px;color:var(--ink-soft);line-height:1.5;}
  .grammar{margin-top:12px;border-top:1px dashed var(--rule);padding-top:10px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .chip{font-family:'Noto Serif JP',serif;font-size:13px;padding:2px 8px;border-radius:4px;border:1px solid rgba(74,89,168,0.3);background:rgba(74,89,168,0.1);color:#4A59A8;}
</style>
</head>
<body>
  <div class="panel">
    <span class="lbl">TRANSLATION</span>
    <div class="en">"Let's become Treasure Hunters."</div>
    <div class="note">
      <span class="lbl">NOTE</span>
      <p>なろう is the volitional of なる ("to become"); ぜ is a casual, assertive sentence-ending particle used mostly by men among friends.</p>
    </div>
    <div class="grammar">
      <span class="lbl" style="margin:0;">GRAMMAR</span>
      <span class="chip">〜よう／おう＋ぜ</span>
    </div>
  </div>
</body>
</html>
