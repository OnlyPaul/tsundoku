<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Tsundoku — Brand mark</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body{margin:0;padding:24px;display:flex;align-items:center;gap:28px;background:var(--paper);}
  .mark{width:96px;height:96px;border-radius:8px;background:var(--vermillion);display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:var(--shadow-soft);}
  .mark span{font-family:var(--font-jp);color:var(--paper);font-size:56px;font-weight:600;line-height:1;}
  .word{font-family:var(--font-prose);font-weight:500;font-size:38px;color:var(--ink);letter-spacing:-0.01em;line-height:1;}
  .sub{margin-top:6px;}
  .row{display:flex;align-items:center;gap:14px;margin-top:14px;}
  .swatch{width:18px;height:18px;border-radius:3px;border:1px solid rgba(0,0,0,0.06);}
</style>
</head>
<body>
  <div class="mark"><span>積</span></div>
  <div>
    <div class="word">tsundoku</div>
    <div class="meta sub">積ん読 ・ Japanese reader ・ since 2024</div>
    <div class="row">
      <div class="swatch" style="background:#BC5A2C"></div>
      <div class="swatch" style="background:#1F1B16"></div>
      <div class="swatch" style="background:#F5EFE4"></div>
      <div class="swatch" style="background:#4A59A8"></div>
      <span class="meta-tight">brand · ink · paper · indigo</span>
    </div>
  </div>
</body>
</html>
