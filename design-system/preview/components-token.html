<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Tsundoku — Tappable token</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body{margin:0;padding:22px;background:var(--paper);font-family:var(--font-jp);font-size:22px;line-height:2.0;color:var(--ink);}
  .meta{margin-bottom:8px;}
  .dim{color:rgba(31,27,22,0.42);}
  .word{font-weight:500;cursor:pointer;border-radius:3px;padding:0 1px;}
  .word:hover{color:var(--vermillion);}
  .active{background:rgba(74,89,168,0.12);box-shadow:inset 0 -2px 0 #4A59A8;color:#1F1B16;}
  ruby rt{font-family:var(--font-jp);font-size:0.5em;color:rgba(31,27,22,0.55);font-weight:400;}
</style>
</head>
<body>
  <div class="meta">TAPPABLE = BOLD ・ PARTICLES = DIMMED ・ ACTIVE = INDIGO RULE</div>
  <ruby class="word"><rb>俺達</rb><rt>おれたち</rt></ruby><span class="dim">なら</span><span class="dim">……</span><span class="dim">この</span><ruby class="word active"><rb>六人</rb><rt>ろくにん</rt></ruby><span class="dim">なら</span><span class="dim">、</span><span class="word">きっと</span><span class="word">なれる</span><span class="dim">。</span>
</body>
</html>
