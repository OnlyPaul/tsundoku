<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Tsundoku — Type scale</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body{margin:0;padding:20px;background:var(--paper);}
  .row{display:flex;flex-direction:column;gap:8px;}
  .line{display:grid;grid-template-columns:90px 1fr;align-items:baseline;gap:20px;}
  .tag{font-family:var(--font-mono);font-size:10px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:0.12em;}
</style>
</head>
<body>
  <div class="row">
    <div class="line"><span class="tag">H1 · 60</span><span style="font-family:var(--font-jp);font-size:60px;font-weight:500;line-height:1;">本棚</span></div>
    <div class="line"><span class="tag">H2 · 36</span><span style="font-family:var(--font-jp);font-size:36px;font-weight:500;line-height:1.1;">第一章　罰ゲームと対処法</span></div>
    <div class="line"><span class="tag">H3 · 24</span><span style="font-family:var(--font-jp);font-size:24px;font-weight:500;">設定</span></div>
    <div class="line"><span class="tag">BODY · 17</span><span style="font-family:var(--font-prose);font-size:17px;">It all began with one line I'll never forget.</span></div>
    <div class="line"><span class="tag">META · 11</span><span class="meta">CONTINUE READING ・ CH. 04 / 28</span></div>
  </div>
</body>
</html>
