<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Tsundoku — Elevation</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body{margin:0;padding:24px;background:var(--paper);display:flex;gap:24px;align-items:center;}
  .demo{display:flex;flex-direction:column;gap:8px;align-items:center;}
  .lbl{font-family:var(--font-mono);font-size:10px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:0.12em;}
  .card{width:120px;height:80px;background:#FBF7EE;border-radius:6px;}
  .border{border:1px solid var(--rule);}
  .soft{box-shadow:0 1px 2px rgba(31,27,22,0.06);}
  .cardsh{box-shadow:0 1px 3px rgba(31,27,22,0.08);}
  .cover{background:linear-gradient(165deg,#E8C9A1 0%,#B96B4B 55%,#3F2A1E 100%);box-shadow:0 1px 2px rgba(0,0,0,0.12),0 4px 14px rgba(31,27,22,0.18),inset -2px 0 4px rgba(0,0,0,0.15);border-radius:2px;width:64px;height:96px;}
  .blur{background:rgba(245,239,228,0.9);backdrop-filter:blur(8px);border-bottom:1px solid var(--rule);}
</style>
</head>
<body>
  <div class="demo"><div class="card border"></div><div class="lbl">border (1px)</div></div>
  <div class="demo"><div class="card border soft"></div><div class="lbl">shadow-soft</div></div>
  <div class="demo"><div class="card border cardsh"></div><div class="lbl">shadow-card</div></div>
  <div class="demo"><div class="cover"></div><div class="lbl">cover</div></div>
  <div class="demo"><div class="card blur"></div><div class="lbl">backdrop-blur</div></div>
</body>
</html>
