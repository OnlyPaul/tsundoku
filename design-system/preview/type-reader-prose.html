<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Tsundoku — Reader prose specimen</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body{margin:0;padding:20px;background:var(--paper);}
  .specimen{font-family:var(--font-jp);font-size:18px;line-height:1.95;color:var(--ink);}
  .specimen .dim{color:rgba(31,27,22,0.42);}
  .specimen .word{font-weight:500;}
  ruby rt{font-family:var(--font-jp);font-size:0.5em;color:rgba(31,27,22,0.55);font-weight:400;}
  .meta{margin-bottom:6px;}
</style>
</head>
<body>
  <div class="meta">CHAPTER 1 ・ READER PROSE @ 18PX / 1.95</div>
  <p class="specimen">
    <ruby class="word">全<rt>すべ</rt></ruby><span class="dim">て</span><span class="dim">の</span><ruby class="word">始<rt>はじ</rt></ruby><span class="word">まり</span><span class="dim">は</span><ruby class="word">忘<rt>わす</rt></ruby><span class="word">れ</span><span class="dim">も</span><span class="dim">し</span><span class="dim">ない</span><span class="word">あの</span><ruby class="word">一<rt>ひと</rt></ruby><ruby class="word">言<rt>こと</rt></ruby><span class="dim">。</span>
    <ruby class="word">トレジャーハンター</ruby><span class="dim">に</span><span class="word">なろう</span><span class="dim">ぜ</span><span class="dim">。</span>
  </p>
</body>
</html>
